<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo - Calle Alta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Encabezado -->
  <header>
    <div class="navbar">
      <h1 class="logo">Calle Alta</h1>
      <a href="index.html" class="catalogo-btn">Inicio</a>
      <a href="catalogo.html" class="catalogo-btn">ELFBAR</a>
    </div>

  <!-- Catálogo -->
  <section class="catalogo">
    <h2>LOSTMARY</h2>

    <div class="productos">
      <!-- Producto 1 -->
     <div class="producto">
  <img src="lost mary grrapefruit green tea mixer.jpg" alt="LOST MARY GRAPEFRUIT GREEN TEA MIXER 30K">
  <h3>LOST MARY GRAPEFRUIT GREEN TEA MIXERZ 30K</h3>
  <p>$25000</p>
  <button class="agregar-carrito-btn" data-nombre="LOST MARY GRAPEFRUIT GREEN TEA MIXERZ 30K" data-precio="25000">
    Agregar al carrito
  </button>
</div>

      <!-- Producto 2 -->
     <div class="producto">
  <img src="moble-8-a0e37b7f547297dd9217528716112078-480-0.webp" alt="LOST MARY APPLE GRAPE MIXER 30K">
  <h3>LOST MARY APPLE GRAPE MIXER 30K</h3>
  <p>$25000</p>
  <button class="agregar-carrito-btn" data-nombre="LOST MARY APPLE GRAPE MIXER 30K" data-precio="25000">
    Agregar al carrito
  </button>
</div>
   <!-- Producto 3 -->
     <div class="producto">
  <img src="lost-mary-mixer-30k-mix-mint.jpg" alt="LOST MARY MINT MIX MIXER 30K">
  <h3>LOST MARY MINT MIX MIXER 30K</h3>
  <p>$25000</p>
  <button class="agregar-carrito-btn" data-nombre="LOST MARY MINT MIX MIXER 30K" data-precio="25000">
    Agregar al carrito
  </button>
</div>
      
  <!-- Producto 4 -->
     <div class="producto">
  <img src="lost-mary-mixer-30k- lemon lime.jpg" alt="LOST MARY GRAPEFRUIT LEMON LIME MIXER 30K">
  <h3>LOST MARY GRAPEFRUIT LEMON LIME MIXER 30K</h3>
  <p>$25000</p>
  <button class="agregar-carrito-btn" data-nombre="LOST MARY GRAPEFRUIT LEMON LIME MIXER 30K" data-precio="25000">
    Agregar al carrito
  </button>
</div>
      
  
  </section>
   <!-- Carrito -->
   <section class="carrito-container">
    <h2>Carrito</h2>
    <ul id="carrito-lista"></ul>
    <p id="carrito-vacio">Tu carrito está vacío.</p>
    <p id="total">Total: $0</p>
    <button id="finalizar-compra" class="finalizar-btn">Finalizar compra</button>
  
    <div id="formulario-pago" class="formulario-pago" style="display:none;">
      <form
  action="https://formspree.io/f/xdawjbrg"
  method="POST" id="formulario-compra">
        <h3>Datos para la compra</h3>
        
        <input type="text" name="nombre" placeholder="Nombre completo" required>
        <input type="email" name="email" placeholder="Correo electrónico" required>
        <input type="text" name="direccion" placeholder="Dirección de envío" required>
        <input type="text" name="número de teléfono" placeholder="Número de teléfono" required>
        <select name="pago" required>
          <option value="">Selecciona método de pago</option>
          <option value="efectivo">Pago en efectivo (solo a CABA)</option>
          <option value="transferencia">Transferencia</option>
        </select>
  
        <!-- Este textarea es donde el carrito se copia automáticamente -->
        <textarea name="pedido" id="resumenPedido" style="display: none;"></textarea>
  
        <button type="submit" class="pagar-btn">Confirmar compra</button>
      </form>
    </div>
  </section>
  <script src="app.js"></script>
</body>
</html>
